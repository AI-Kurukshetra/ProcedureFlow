<div class="app-layout">
  <app-sidebar></app-sidebar>
  <div class="main-content">
    <app-navbar></app-navbar>
    <div class="page-content">
      <div class="page-header">
        <h1>Procedure Templates</h1>
      </div>

      <div *ngIf="loading" style="text-align:center;padding:60px"><mat-spinner diameter="40"></mat-spinner></div>

      <mat-card *ngIf="!loading">
        <mat-card-content>
          <mat-form-field appearance="outline">
            <mat-label>Filter by Specialty</mat-label>
            <mat-select [(ngModel)]="filterSpecialty" (selectionChange)="load()">
              <mat-option value="">All Specialties</mat-option>
              <mat-option *ngFor="let specialty of specialties" [value]="specialty.id">
                {{ specialty.name }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </mat-card-content>
      </mat-card>

      <div class="template-grid" *ngIf="!loading">
        <mat-card *ngFor="let t of templates" class="template-card">
          <mat-card-header>
            <mat-card-title>{{ t.name }}</mat-card-title>
            <mat-card-subtitle>{{ t.specialty?.name }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <p>{{ t.description || 'No description' }}</p>
            <div class="template-meta">
              <span>{{ t.fields.length }} fields</span>
              <span>v{{ t.version }}</span>
              <mat-chip [class]="t.isActive ? 'active' : 'inactive'">{{ t.isActive ? 'Active' : 'Inactive' }}</mat-chip>
            </div>
          </mat-card-content>
          <mat-card-actions *ngIf="isAdmin">
            <button mat-button color="primary" (click)="clone(t.id)">
              <mat-icon>content_copy</mat-icon> Clone
            </button>
            <button mat-button color="warn" (click)="delete(t.id)">
              <mat-icon>delete</mat-icon> Deactivate
            </button>
          </mat-card-actions>
        </mat-card>
        <div *ngIf="templates.length === 0" class="empty-state">No templates found</div>
      </div>
    </div>
  </div>
</div>
